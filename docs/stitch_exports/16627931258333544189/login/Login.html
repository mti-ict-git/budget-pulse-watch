<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden" data-mode="connect">
<!-- Editorial Background Elements -->
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[60%] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[35%] h-[55%] bg-tertiary/5 rounded-full blur-[100px]"></div>
<!-- Main Content Container -->
<main class="w-full max-w-[440px] z-10">
<!-- Brand Header Section -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-16 h-16 mb-6 flex items-center justify-center rounded-xl bg-gradient-to-br from-primary to-primary-container shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="analytics">analytics</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface mb-2">PRF Monitoring</h1>
<p class="font-body text-on-surface-variant/80 text-sm">PT. Merdeka Tsingshan Indonesia</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_24px_48px_rgba(25,27,35,0.06)] p-8 md:p-10 border border-outline-variant/10">
<form class="space-y-6">
<!-- Username Input Group -->
<div class="space-y-2">
<label class="font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant" for="username">Username</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-transparent rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface placeholder:text-outline/50 font-body text-sm" id="username" name="username" placeholder="e.g. j.doe@company.com" type="text">
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-primary font-label text-[11px] font-bold uppercase tracking-wider hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-surface-container-low border-transparent rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface placeholder:text-outline/50 font-body text-sm" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Error State (Visible by requirement) -->
<div class="flex items-center gap-3 p-4 bg-error-container/40 rounded-lg border border-error/10">
<span class="material-symbols-outlined text-error text-xl" data-icon="error">error</span>
<span class="font-body text-sm text-on-error-container font-medium">Invalid credentials</span>
</div>
<!-- Sign In Button -->
<button class="w-full relative group overflow-hidden bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<!-- Loading Spinner State (Demonstrated within button) -->
<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
<span>Sign In</span>
</button>
</form>
<!-- SSO / Secondary Actions -->
<div class="mt-8 pt-8 border-t border-outline-variant/20">
<p class="text-center font-label text-[10px] font-bold uppercase tracking-[0.15rem] text-outline mb-6">Or continue with</p>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-high rounded-lg hover:bg-surface-variant transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-xl" data-icon="key">key</span>
<span class="font-label text-[11px] font-bold uppercase">SSO Login</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-high rounded-lg hover:bg-surface-variant transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-xl" data-icon="fingerprint">fingerprint</span>
<span class="font-label text-[11px] font-bold uppercase">Biometric</span>
</button>
</div>
</div>
</div>
<!-- Footer Help -->
<footer class="mt-10 flex flex-col items-center gap-4">
<div class="flex items-center gap-6">
<a class="font-label text-[11px] font-bold uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<a class="font-label text-[11px] font-bold uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Support</a>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<a class="font-label text-[11px] font-bold uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Terms</a>
</div>
<p class="text-[10px] text-outline/60 font-medium">© 2024 PRF Monitoring Systems Inc.</p>
</footer>
</main>
<!-- Side Graphic (Desktop only) -->
<div class="hidden lg:block fixed top-1/2 right-[5%] translate-y-[-50%] w-[400px]">
<div class="grid grid-cols-2 gap-4 items-end">
<div class="space-y-4">
<div class="h-32 bg-primary/10 rounded-xl p-4 flex flex-col justify-end">
<div class="w-8 h-1 bg-primary/40 rounded-full mb-2"></div>
<div class="w-12 h-1 bg-primary/20 rounded-full"></div>
</div>
<div class="h-64 bg-surface-container-highest shadow-xl rounded-xl p-6 flex flex-col justify-between border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="insights">insights</span>
<div>
<div class="h-1 w-full bg-surface-variant rounded-full mb-3"></div>
<div class="h-1 w-3/4 bg-surface-variant rounded-full"></div>
</div>
</div>
</div>
<div class="space-y-4">
<div class="h-48 bg-surface-container-highest shadow-xl rounded-xl p-6 flex flex-col justify-between border border-outline-variant/10">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-tertiary" data-icon="speed">speed</span>
<span class="text-[10px] font-bold text-primary uppercase">Active</span>
</div>
<div class="h-24 w-full flex items-end gap-1">
<div class="flex-1 bg-primary-container/20 rounded-t-sm h-[40%]"></div>
<div class="flex-1 bg-primary-container/20 rounded-t-sm h-[60%]"></div>
<div class="flex-1 bg-primary-container h-[85%] shadow-sm"></div>
<div class="flex-1 bg-primary-container/20 rounded-t-sm h-[50%]"></div>
</div>
</div>
<div class="h-32 bg-tertiary/5 rounded-xl"></div>
</div>
</div>
</div>
