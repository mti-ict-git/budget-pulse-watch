services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9007:8080"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5004:3001"
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      PORT: "3001"
      GRAPH_TOKEN_CACHE_PATH: /app/data/token_cache.json
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    volumes:
      - ./backend/data:/app/data
      - ./backend/temp:/app/temp
      - ./docs:/app/docs:ro
    user: root
    privileged: true
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    restart: unless-stopped

  pronto_sync:
    build:
      context: ./backend
      dockerfile: pronto-sync/Dockerfile
    depends_on:
      - backend
    env_file:
      - ./backend/.env.production
    environment:
      POMON_BASE_URL: http://backend:3001
      PRONTO_SYNC_ENABLED: "true"
      PRONTO_SYNC_JITTER_SECONDS: "30"
      ARTIFACTS_DIR: /app/artifacts
      PRONTO_HEADLESS: "1"
      PRONTO_CAPTURE_SCREENSHOTS: "0"
      PRONTO_WRITE_PER_PO_JSON: "0"
      PRONTO_STORAGE_STATE_PATH: /app/artifacts/pronto_storage_state.json
      PRONTO_PROFILE_DIR: /app/artifacts/pronto-profile
    volumes:
      - ./backend/artifacts:/app/artifacts
    restart: unless-stopped
